<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunny Test Avatar</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f3f3;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .avatar-wrap {
      width: 320px;
      height: 320px;
      display: grid;
      place-items: center;
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      margin-bottom: 20px;
      overflow: hidden;
    }

    .avatar-stage {
      position: relative;
      width: 260px;
      height: 260px;
    }

    .avatar-stage img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    #mouthOverlay {
      transition: opacity 80ms ease;
      will-change: opacity;
      opacity: 1;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #ff7a00;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.92;
    }

    pre {
      margin-top: 20px;
      width: min(900px, 90vw);
      background: #111;
      color: #ddd;
      padding: 12px;
      border-radius: 10px;
      overflow: auto;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>Sunny Mouth Test</h1>

  <div class="avatar-wrap">
    <div class="avatar-stage">
      <img id="baseHead" src="./mouths/base-head.png" alt="Sunny base head" />
      <img id="mouthOverlay" src="./mouths/X.png" alt="Sunny mouth overlay" />
    </div>
  </div>
  <input id="inputText" placeholder="Say something..." />
  <button id="playBtn" disabled>Loading Mouths...</button>

  <audio id="audio" src="http://localhost:8000/static/audio/test.wav"></audio>

  <pre id="debug"></pre>

<script>
const baseHead = document.getElementById("baseHead");
const mouthOverlay = document.getElementById("mouthOverlay");
const playBtn = document.getElementById("playBtn");
const audio = document.getElementById("audio");
const debug = document.getElementById("debug");
const input = document.getElementById("inputText");

const visemeMap = {
  X: "./mouths/X.png",
  A: "./mouths/X.png",
  B: "./mouths/B.png",
  C: "./mouths/C.png",
  D: "./mouths/D.png",
  E: "./mouths/E.png",
  F: "./mouths/F.png",
  G: "./mouths/G.png",
  H: "./mouths/H.png"
};

const preloadSources = [...new Set(["./mouths/base-head.png", ...Object.values(visemeMap)])];

let mouthCues = [];
let rafId = null;
let currentMouthSource = visemeMap.X;

function preloadImages() {
  return Promise.all(
    preloadSources.map(
      source =>
        new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(source);
          image.onerror = () => reject(new Error(`Failed to preload ${source}`));
          image.src = source;
        })
    )
  );
}

function setMouth(viseme) {
  const nextSource = visemeMap[viseme] || visemeMap.X;
  if (nextSource === currentMouthSource) {
    return;
  }

  currentMouthSource = nextSource;
  mouthOverlay.style.opacity = "0.86";
  mouthOverlay.src = nextSource;

  requestAnimationFrame(() => {
    mouthOverlay.style.opacity = "1";
  });
}

function animateMouths() {
  const t = audio.currentTime;
  const cue = mouthCues.find(c => t >= c.start && t < c.end);

  if (cue) {
    setMouth(cue.value);
  } else {
    setMouth("X");
  }

  if (!audio.paused && !audio.ended) {
    rafId = requestAnimationFrame(animateMouths);
  } else {
    setMouth("X");
  }
}

async function playTest() {
  try {
    if (rafId) {
      cancelAnimationFrame(rafId);
      rafId = null;
    }

    const res = await fetch("http://localhost:8000/api/avatar/speak", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        text: input.value || "How can I assist you today?"
      })
    });

    if (!res.ok) {
      throw new Error(`Failed to load avatar data: ${res.status}`);
    }

    const data = await res.json();
    console.log("AVATAR DATA:", data);

    mouthCues = data.mouthCues || [];
    audio.src = `http://localhost:8000${data.audioUrl}`;
    debug.textContent = JSON.stringify(data, null, 2);

    audio.currentTime = 0;
    setMouth("X");

    await audio.play();
    animateMouths();
  } catch (err) {
    console.error(err);
    debug.textContent = String(err);
  }
}

async function initializeAvatar() {
  try {
    await preloadImages();
    baseHead.src = "./mouths/base-head.png";
    mouthOverlay.src = visemeMap.X;
    currentMouthSource = visemeMap.X;
    playBtn.disabled = false;
    playBtn.textContent = "Play Test";
  } catch (err) {
    console.error(err);
    debug.textContent = String(err);
    playBtn.textContent = "Asset Load Failed";
  }
}

audio.addEventListener("ended", () => {
  setMouth("X");
});

playBtn.addEventListener("click", playTest);
initializeAvatar();
</script>
