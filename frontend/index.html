<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sunny — AI Banking Assistant Avatar Demo" />
  <title>Sunny — AI Banking Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── Design Tokens ─── */
    :root {
      --bg-gradient-start: #0f0c29;
      --bg-gradient-mid: #1a1440;
      --bg-gradient-end: #24243e;
      --card-bg: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.12);
      --accent: #ff8a2b;
      --accent-glow: rgba(255,138,43,0.35);
      --accent-hover: #ff9d50;
      --text-primary: #f0eef6;
      --text-secondary: rgba(240,238,246,0.55);
      --radius-xl: 28px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
    }

    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: linear-gradient(160deg, var(--bg-gradient-start), var(--bg-gradient-mid), var(--bg-gradient-end));
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text-primary);
      overflow-x: hidden;
    }

    /* ─── Glass Card ─── */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(24px) saturate(1.3);
      -webkit-backdrop-filter: blur(24px) saturate(1.3);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-xl);
      padding: 36px 32px 32px;
      width: min(420px, 92vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
      position: relative;
    }

    /* ─── Header ─── */
    .header {
      text-align: center;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 0.82rem;
      color: var(--text-secondary);
      font-weight: 400;
    }

    /* ─── Avatar Container ─── */
    .avatar-container {
      position: relative;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      overflow: visible;
    }

    /* Thinking / speaking ring */
    .avatar-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2.5px solid transparent;
      transition: border-color 0.4s ease, box-shadow 0.4s ease;
      pointer-events: none;
      z-index: 0;
    }

    .avatar-container.thinking .avatar-ring {
      border-color: var(--accent);
      box-shadow: 0 0 28px var(--accent-glow), 0 0 56px rgba(255,138,43,0.15);
      animation: pulseRing 1.6s ease-in-out infinite;
    }

    .avatar-container.speaking .avatar-ring {
      border-color: var(--accent);
      box-shadow: 0 0 18px var(--accent-glow);
    }

    @keyframes pulseRing {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.02); }
    }

    /* ─── Avatar Stage ─── */
    .avatar-stage {
      position: relative;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      overflow: hidden;
      z-index: 1;
      background: rgba(0,0,0,0.15);
    }

    .avatar-stage img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    #mouthOverlay {
      transition: opacity 60ms ease;
      will-change: opacity;
      opacity: 1;
    }

    /* ─── Status Badge ─── */
    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: var(--text-secondary);
      transition: color var(--transition);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      transition: background var(--transition), box-shadow var(--transition);
    }

    .status-badge[data-state="idle"] .status-dot { background: #4ade80; }
    .status-badge[data-state="thinking"] .status-dot {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
      animation: pulseDot 1.2s ease-in-out infinite;
    }
    .status-badge[data-state="speaking"] .status-dot {
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent-glow);
    }

    @keyframes pulseDot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ─── Input Row ─── */
    .input-row {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    #inputText {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-md);
      background: rgba(255,255,255,0.05);
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 0.92rem;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    #inputText::placeholder {
      color: var(--text-secondary);
    }

    #inputText:focus {
      border-color: rgba(255,138,43,0.5);
      box-shadow: 0 0 0 3px rgba(255,138,43,0.12);
    }

    /* ─── Button ─── */
    #sendBtn {
      padding: 12px 22px;
      border: none;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--accent), #e06b10);
      color: white;
      font-family: var(--font);
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
      white-space: nowrap;
    }

    #sendBtn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }

    #sendBtn:active:not(:disabled) {
      transform: translateY(0);
    }

    #sendBtn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* ─── Transcript ─── */
    .transcript {
      width: 100%;
      min-height: 40px;
      max-height: 120px;
      overflow-y: auto;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.06);
      font-size: 0.82rem;
      color: var(--text-secondary);
      line-height: 1.5;
      transition: color var(--transition);
    }

    .transcript.active {
      color: var(--text-primary);
    }

    /* ─── Debug Panel (hidden by default) ─── */
    #debugPanel {
      display: none;
      width: min(900px, 90vw);
      margin-top: 20px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.08);
      color: #aaa;
      padding: 12px;
      border-radius: var(--radius-md);
      overflow: auto;
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      max-height: 250px;
    }

    /* ─── Utility ─── */
    .debug-toggle {
      margin-top: 12px;
      font-size: 0.72rem;
      color: var(--text-secondary);
      cursor: pointer;
      opacity: 0.5;
      transition: opacity var(--transition);
      user-select: none;
    }

    .debug-toggle:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <div class="card" id="mainCard">
    <div class="header">
      <h1>Sunny</h1>
      <p>AI Banking Assistant</p>
    </div>

    <div class="avatar-container" id="avatarContainer">
      <div class="avatar-ring"></div>
      <div class="avatar-stage" id="avatarStage">
        <img id="baseHead" src="./mouths/base-head.png" alt="Sunny avatar" />
        <img id="mouthOverlay" src="./mouths/X.png" alt="Mouth overlay" />
      </div>
    </div>

    <div class="status-badge" id="statusBadge" data-state="idle">
      <span class="status-dot"></span>
      <span id="statusText">Ready</span>
    </div>

    <div class="transcript" id="transcript">How can I help you today?</div>

    <div class="input-row">
      <input id="inputText" type="text" placeholder="Ask Sunny anything..." autocomplete="off" />
      <button id="sendBtn" disabled>Loading…</button>
    </div>
  </div>

  <span class="debug-toggle" id="debugToggle">Toggle Debug</span>
  <pre id="debugPanel"></pre>

<script>
// ═══════════════════════════════════════════════════════════
//  SUNNY STREAMING AVATAR — Frontend Controller
// ═══════════════════════════════════════════════════════════

const API_BASE = "http://localhost:8000";
const WS_URL  = "ws://localhost:8000/api/avatar/stream";

// ── DOM refs ──
const baseHead       = document.getElementById("baseHead");
const mouthOverlay   = document.getElementById("mouthOverlay");
const avatarContainer= document.getElementById("avatarContainer");
const avatarStage    = document.getElementById("avatarStage");
const statusBadge    = document.getElementById("statusBadge");
const statusText     = document.getElementById("statusText");
const transcript     = document.getElementById("transcript");
const inputText      = document.getElementById("inputText");
const sendBtn        = document.getElementById("sendBtn");
const debugPanel     = document.getElementById("debugPanel");
const debugToggle    = document.getElementById("debugToggle");

// ── Viseme map ──
const visemeMap = {
  X: "./mouths/X.png",
  A: "./mouths/X.png",
  B: "./mouths/B.png",
  C: "./mouths/C.png",
  D: "./mouths/D.png",
  E: "./mouths/E.png",
  F: "./mouths/F.png",
  G: "./mouths/G.png",
  H: "./mouths/H.png"
};

const preloadSources = [...new Set(["./mouths/base-head.png", ...Object.values(visemeMap)])];

// ── State ──
let currentMouthSource = visemeMap.X;
let appState = "idle";           // idle | thinking | speaking
let audioCtx = null;
let fillerData = [];             // Stores our pre-computed filler payload

// ═══════════════════════════════════════════════════════════
//  IDLE ANIMATION ENGINE
// ═══════════════════════════════════════════════════════════

const idle = {
  rafId: null,
  startTime: 0,

  start() {
    this.startTime = performance.now();
    this.tick = this.tick.bind(this);
    this.rafId = requestAnimationFrame(this.tick);
  },

  stop() {
    if (this.rafId) { cancelAnimationFrame(this.rafId); this.rafId = null; }
  },

  tick(now) {
    const elapsed = (now - this.startTime) / 1000;

    // Organic breathing — gentle vertical float (4s period)
    const floatY = 2.5 * Math.sin(elapsed * (2 * Math.PI / 4.0));
    
    // Head sway — very subtle horizontal drift (6s period)
    const swayX = 1.2 * Math.sin(elapsed * (2 * Math.PI / 6.0));

    // Apply the transform without squishing the pixels via scale
    avatarStage.style.transform = `translate(${swayX.toFixed(2)}px, ${floatY.toFixed(2)}px)`;

    this.rafId = requestAnimationFrame(this.tick);
  }
};


// ═══════════════════════════════════════════════════════════
//  MOUTH ANIMATION
// ═══════════════════════════════════════════════════════════

let mouthRafId = null;

function setMouth(viseme) {
  const nextSource = visemeMap[viseme] || visemeMap.X;
  if (nextSource === currentMouthSource) return;
  currentMouthSource = nextSource;
  mouthOverlay.style.opacity = "0.86";
  mouthOverlay.src = nextSource;
  requestAnimationFrame(() => { mouthOverlay.style.opacity = "1"; });
}

// Fallback mouth cycle — used when viseme cues aren't available yet
const FALLBACK_VISEMES = ["B", "C", "D", "C", "B", "E", "C", "D", "B", "X"];
let fallbackIdx = 0;
let fallbackTimer = null;

function startFallbackMouth() {
  stopFallbackMouth();
  fallbackIdx = 0;
  fallbackTimer = setInterval(() => {
    setMouth(FALLBACK_VISEMES[fallbackIdx % FALLBACK_VISEMES.length]);
    fallbackIdx++;
  }, 90 + Math.random() * 40);   // 90–130 ms per frame ≈ ~8-11 Hz
}

function stopFallbackMouth() {
  if (fallbackTimer) { clearInterval(fallbackTimer); fallbackTimer = null; }
  setMouth("X");
}

// Viseme-synced mouth animation: given mouthCues array and a start timestamp
function animateWithCues(cues, audioStartTime) {
  stopFallbackMouth();
  if (mouthRafId) cancelAnimationFrame(mouthRafId);

  function tick() {
    const elapsed = (performance.now() - audioStartTime) / 1000;
    const cue = cues.find(c => elapsed >= c.start && elapsed < c.end);
    if (cue) {
      setMouth(cue.value);
    } else if (elapsed < (cues.length ? cues[cues.length - 1].end : 0)) {
      setMouth("X");
    }
    // Keep animating until we've past the last cue
    const lastEnd = cues.length ? cues[cues.length - 1].end : 0;
    if (elapsed < lastEnd + 0.1) {
      mouthRafId = requestAnimationFrame(tick);
    } else {
      setMouth("X");
      mouthRafId = null;
    }
  }
  mouthRafId = requestAnimationFrame(tick);
}

function stopMouthAnimation() {
  stopFallbackMouth();
  if (mouthRafId) { cancelAnimationFrame(mouthRafId); mouthRafId = null; }
  setMouth("X");
}


// ═══════════════════════════════════════════════════════════
//  AUDIO PLAYBACK ENGINE (Web Audio API)
// ═══════════════════════════════════════════════════════════

function ensureAudioContext() {
  if (!audioCtx || audioCtx.state === "closed") {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }
  return audioCtx;
}

/**
 * Queue of audio chunks.  Each entry:
 *   { buffer: AudioBuffer, cues: [], duration: number, sentence: string }
 */
let chunkQueue = [];
let isPlaying = false;
let currentSource = null;

async function decodeBase64Wav(base64Str) {
  const ctx = ensureAudioContext();
  const binaryStr = atob(base64Str);
  const len = binaryStr.length;
  const bytes = new Uint8Array(len);
  for (let i = 0; i < len; i++) bytes[i] = binaryStr.charCodeAt(i);
  return ctx.decodeAudioData(bytes.buffer);
}

function enqueueChunk(audioBuffer, cues, duration, sentence) {
  chunkQueue.push({ buffer: audioBuffer, cues, duration, sentence });
  if (!isPlaying) playNextChunk();
}

function playNextChunk() {
  if (chunkQueue.length === 0) {
    isPlaying = false;
    stopMouthAnimation();
    setState("idle");
    return;
  }

  isPlaying = true;
  const chunk = chunkQueue.shift();
  const ctx = ensureAudioContext();

  // Update transcript
  transcript.textContent = chunk.sentence || transcript.textContent;
  transcript.classList.add("active");

  currentSource = ctx.createBufferSource();
  currentSource.buffer = chunk.buffer;
  currentSource.connect(ctx.destination);

  const startTime = performance.now();

  // Use viseme cues if available, fallback otherwise
  if (chunk.cues && chunk.cues.length > 0) {
    animateWithCues(chunk.cues, startTime);
  } else {
    startFallbackMouth();
  }

  currentSource.onended = () => {
    currentSource = null;
    stopFallbackMouth();
    playNextChunk();
  };

  currentSource.start(0);
}

function stopPlayback() {
  chunkQueue = [];
  if (currentSource) {
    try { currentSource.stop(); } catch(e) { /* already stopped */ }
    currentSource = null;
  }
  isPlaying = false;
  stopMouthAnimation();
}


// ═══════════════════════════════════════════════════════════
//  STATE MANAGEMENT
// ═══════════════════════════════════════════════════════════

function setState(newState) {
  appState = newState;
  avatarContainer.className = "avatar-container " + newState;
  statusBadge.setAttribute("data-state", newState);

  switch (newState) {
    case "idle":
      statusText.textContent = "Ready";
      sendBtn.disabled = false;
      sendBtn.textContent = "Send";
      transcript.classList.remove("active");
      break;
    case "thinking":
      statusText.textContent = "Thinking…";
      sendBtn.disabled = true;
      sendBtn.textContent = "…";
      break;
    case "speaking":
      statusText.textContent = "Speaking";
      sendBtn.disabled = true;
      sendBtn.textContent = "…";
      break;
  }
}

function logDebug(msg) {
  const stamp = new Date().toISOString().slice(11, 23);
  debugPanel.textContent += `[${stamp}] ${msg}\n`;
  debugPanel.scrollTop = debugPanel.scrollHeight;
}


// ═══════════════════════════════════════════════════════════
//  WEBSOCKET STREAMING
// ═══════════════════════════════════════════════════════════

async function streamSpeak(text) {
  stopPlayback();
  ensureAudioContext();
  setState("thinking");
  logDebug(`Sending: "${text}"`);

  // Clear transcript for new response
  transcript.textContent = "";
  transcript.classList.add("active");

  let streamingText = "";  // accumulates LLM tokens for live display
  
  // Play a random filler immediately if available
  if (fillerData.length > 0) {
    const randomFiller = fillerData[Math.floor(Math.random() * fillerData.length)];
    logDebug(`Playing filler: ${randomFiller.text}`);
    
    // We queue the filler up instantly!
    try {
      const res = await fetch(`${API_BASE}${randomFiller.audioUrl}`);
      const arrayBuffer = await res.arrayBuffer();
      const audioBuffer = await ensureAudioContext().decodeAudioData(arrayBuffer);
      enqueueChunk(audioBuffer, randomFiller.mouthCues || [], 0, randomFiller.text);
      setState("speaking");
    } catch(e) {
      logDebug(`Failed to play filler: ${e}`);
    }
  }

  return new Promise((resolve, reject) => {
    const ws = new WebSocket(WS_URL);
    let chunkCount = 0;
    let firstChunkReceived = false;

    ws.onopen = () => {
      logDebug("WebSocket connected");
      ws.send(JSON.stringify({ text }));
    };

    ws.onmessage = async (event) => {
      try {
        const msg = JSON.parse(event.data);

        switch (msg.type) {
          case "thinking":
            logDebug("Server: thinking");
            transcript.textContent = "Thinking…";
            break;

          case "text_delta": {
            // Live streaming text from the LLM
            streamingText += msg.token;
            transcript.textContent = streamingText;
            transcript.scrollTop = transcript.scrollHeight;
            break;
          }

          case "audio_chunk": {
            logDebug(`Chunk ${msg.chunkIndex}: "${msg.sentence}" (${msg.duration?.toFixed(2)}s, ${msg.mouthCues?.length || 0} cues)`);

            const audioBuffer = await decodeBase64Wav(msg.audio);

            if (!firstChunkReceived) {
              firstChunkReceived = true;
              setState("speaking");
            }

            enqueueChunk(audioBuffer, msg.mouthCues || [], msg.duration || 0, msg.sentence || "");
            chunkCount++;
            break;
          }

          case "done":
            logDebug(`Done — ${chunkCount} chunks total`);
            // Show full response in transcript
            if (msg.fullResponse) {
              transcript.textContent = msg.fullResponse;
            }
            ws.close();
            resolve();
            break;

          case "error":
            logDebug(`Error: ${msg.message}`);
            break;
        }
      } catch (err) {
        logDebug(`Parse error: ${err.message}`);
      }
    };

    ws.onerror = (err) => {
      logDebug(`WebSocket error — falling back to HTTP`);
      ws.close();
      fallbackHTTPSpeak(text).then(resolve).catch(reject);
    };

    ws.onclose = () => {
      logDebug("WebSocket closed");
    };
  });
}


// ═══════════════════════════════════════════════════════════
//  HTTP FALLBACK (original POST endpoint)
// ═══════════════════════════════════════════════════════════

async function fallbackHTTPSpeak(text) {
  setState("thinking");
  logDebug("Fallback: using HTTP POST");

  try {
    const res = await fetch(`${API_BASE}/api/avatar/speak`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    logDebug(`Fallback response: ${data.mouthCues?.length} cues`);

    transcript.textContent = data.text || text;
    transcript.classList.add("active");

    // Play with a simple <audio> element as fallback
    const tempAudio = new Audio(`${API_BASE}${data.audioUrl}`);
    setState("speaking");

    const cues = data.mouthCues || [];
    tempAudio.addEventListener("play", () => {
      if (cues.length > 0) {
        animateWithCues(cues, performance.now());
      } else {
        startFallbackMouth();
      }
    });
    tempAudio.addEventListener("ended", () => {
      stopMouthAnimation();
      setState("idle");
    });

    await tempAudio.play();
  } catch (err) {
    logDebug(`Fallback error: ${err.message}`);
    setState("idle");
  }
}


// ═══════════════════════════════════════════════════════════
//  USER INTERACTION
// ═══════════════════════════════════════════════════════════

async function handleSend() {
  const text = inputText.value.trim() || "How can I assist you today?";
  inputText.value = "";

  try {
    await streamSpeak(text);
  } catch (err) {
    logDebug(`Error: ${err.message}`);
    setState("idle");
  }
}

sendBtn.addEventListener("click", handleSend);
inputText.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !sendBtn.disabled) {
    e.preventDefault();
    handleSend();
  }
});

debugToggle.addEventListener("click", () => {
  debugPanel.style.display = debugPanel.style.display === "block" ? "none" : "block";
});


// ═══════════════════════════════════════════════════════════
//  INITIALIZATION
// ═══════════════════════════════════════════════════════════

function preloadImages() {
  return Promise.all(
    preloadSources.map(
      source =>
        new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(source);
          image.onerror = () => reject(new Error(`Failed to preload ${source}`));
          image.src = source;
        })
    )
  );
}

async function preloadFillers() {
  try {
    const res = await fetch(`${API_BASE}/static/fillers/fillers.json`);
    if (res.ok) {
      fillerData = await res.json();
      logDebug(`Preloaded ${fillerData.length} fillers`);
    }
  } catch (err) {
    logDebug(`No fillers found or error: ${err.message}`);
  }
}

async function initializeAvatar() {
  try {
    await preloadImages();
    await preloadFillers();
    baseHead.src = "./mouths/base-head.png";
    mouthOverlay.src = visemeMap.X;
    currentMouthSource = visemeMap.X;

    // Start idle animations
    idle.start();

    setState("idle");
    logDebug("Avatar initialized — idle animations running");
  } catch (err) {
    console.error(err);
    logDebug(`Init error: ${err.message}`);
    sendBtn.textContent = "Asset Load Failed";
  }
}

initializeAvatar();
</script>
</body>
</html>
