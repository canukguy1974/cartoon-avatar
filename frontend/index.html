<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunny Test Avatar</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f3f3;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .avatar-wrap {
      width: 320px;
      height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      margin-bottom: 20px;
      overflow: hidden;
    }

    #mouthFrame {
      width: 260px;
      height: auto;
      object-fit: contain;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #ff7a00;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.92;
    }

    pre {
      margin-top: 20px;
      width: min(900px, 90vw);
      background: #111;
      color: #ddd;
      padding: 12px;
      border-radius: 10px;
      overflow: auto;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>Sunny Mouth Test</h1>

  <div class="avatar-wrap">
    <img id="mouthFrame" src="./mouths/X.png" alt="Sunny mouth frame" />
  </div>
  <input id="inputText" placeholder="Say something..." />
  <button id="playBtn">Play Test</button>

  <audio id="audio" src="http://localhost:8000/static/audio/test.wav"></audio>

  <pre id="debug"></pre>

<script>
const mouthFrame = document.getElementById("mouthFrame");
const playBtn = document.getElementById("playBtn");
const audio = document.getElementById("audio");
const debug = document.getElementById("debug");
const input = document.getElementById("inputText");

const fallbackMap = {
  X: "X",
  A: "A",
  B: "B",
  C: "C",
  D: "C",
  E: "E",
  F: "F",
  G: "F",
  H: "A"
};

let mouthCues = [];
let rafId = null;

function setMouth(viseme) {
  const mapped = fallbackMap[viseme] || "X";
  mouthFrame.src = `./mouths/${mapped}.png`;
}

function animateMouths() {
  const t = audio.currentTime;
  const cue = mouthCues.find(c => t >= c.start && t < c.end);

  if (cue) {
    setMouth(cue.value);
  } else {
    setMouth("X");
  }

  if (!audio.paused && !audio.ended) {
    rafId = requestAnimationFrame(animateMouths);
  } else {
    setMouth("X");
  }
}

async function playTest() {
  try {
    if (rafId) {
      cancelAnimationFrame(rafId);
      rafId = null;
    }

    const res = await fetch("http://localhost:8000/api/avatar/speak", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        text: input.value || "How can I assist you today?"
      })
    });

    if (!res.ok) {
      throw new Error(`Failed to load avatar data: ${res.status}`);
    }

    const data = await res.json();
    console.log("AVATAR DATA:", data);

    mouthCues = data.mouthCues || [];
    audio.src = `http://localhost:8000${data.audioUrl}`;
    debug.textContent = JSON.stringify(data, null, 2);

    audio.currentTime = 0;
    setMouth("X");

    await audio.play();
    animateMouths();
  } catch (err) {
    console.error(err);
    debug.textContent = String(err);
  }
}

audio.addEventListener("ended", () => {
  setMouth("X");
});

playBtn.addEventListener("click", playTest);
</script>
